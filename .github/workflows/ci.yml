# ci.yml, adopted from pydantic ci.yml (https://github.com/pydantic/pydantic/blob/main/.github/workflows/ci.yml).
name: CI

on:
  push:
    branches: [main]
    tags: ['**']
  pull_request: {}

env:
  COLUMNS: 150
  FORCE_COLOR: 1
  UV_FROZEN: '1'
  UV_NO_PROGRESS: '1'

jobs:

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --all-extras --all-groups
      - run: make lint

  typecheck:
    runs-on: ubuntu-latest
    name: Typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --all-extras --all-groups
      - run: uv pip install pre-commit
      - run: make typecheck

  codespell:
    runs-on: ubuntu-latest
    name: Codespell
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --all-extras --all-groups
      - run: uv pip install pre-commit
      - run: make codespell

  schema:
    runs-on: ubuntu-latest
    name: Schema is up to date
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --all-extras --all-groups
      - run: make schema
      - name: Fail if space.schema.json drifted
        run: |
          git diff --exit-code -- space.schema.json || {
            echo "::error::space.schema.json is out of date. Run 'make schema' and commit the result." ;
            exit 1 ;
          }

  examples:
    runs-on: ubuntu-latest
    name: Examples validate
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --all-extras --all-groups
      - run: make examples-validate

  test:
    name: Test ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    env:
      OS: ${{ matrix.os }}
      UV_PYTHON_PREFERENCE: only-managed
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-extras --all-groups
      - name: Print cupli version
        run: 'uv run python -c "from cupli.version import version_info; print(version_info())"'
      - run: mkdir coverage
      - name: Run pytest
        run: make test
        env:
          COVERAGE_FILE: coverage/.coverage.${{ runner.os }}-py${{ matrix.python-version }}
          CONTEXT: ${{ runner.os }}-py${{ matrix.python-version }}
      - name: Store coverage files
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage
          include-hidden-files: true

  coverage-combine:
    needs: [test]
    runs-on: ubuntu-latest
    name: Combine coverage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Get coverage files
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          pattern: coverage-*
          path: coverage
      - run: pip install 'coverage[toml]'
      - run: ls -la coverage
      - run: coverage combine coverage
      - run: coverage report
      - run: coverage html --show-contexts --title "cupli coverage for ${{ github.sha }}"
      - name: Store coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: .coverage
          include-hidden-files: true
      - name: Store coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --all-extras --all-groups
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14

  # https://github.com/marketplace/actions/alls-green
  check:  # gate for branch protection — passes only when every needed job did
    if: always()
    outputs:
      result: ${{ steps.all-green.outputs.result }}
    needs:
      - lint
      - typecheck
      - codespell
      - schema
      - examples
      - test
      - coverage-combine
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        id: all-green
        with:
          jobs: ${{ toJSON(needs) }}

  release:
    name: Publish to PyPI
    needs: [check]
    if: needs.check.outputs.result == 'success' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cupli
    permissions:
      id-token: write
    outputs:
      cupli-version: ${{ steps.check-tag.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check tag matches src/cupli/version.py
        id: check-tag
        uses: samuelcolvin/check-python-version@v5
        with:
          version_file_path: src/cupli/version.py
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
